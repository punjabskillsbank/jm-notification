spring.application.name=jm-notification

spring.datasource.url=jdbc:postgresql://localhost:5432/job_matrix_local
spring.datasource.username=job_matrix
spring.datasource.password=job_matrix
spring.datasource.driver-class-name =org.postgresql.Driver

spring.jpa.hibernate.ddl-auto = validate
spring.jpa.show-sql = true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.kafka.consumer.group-id=jm-notification-group
spring.kafka.consumer.bootstrap-servers=localhost:9092
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.listener.ack-mode=manual

aws.region=ap-south-1

#email required to send emails via SES
ses.sender.email=
server.port=8081
